name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente desde GitHub

# Evita dos deploys simultáneos pisándose en el NAS.
concurrency:
  group: deploy-nas
  cancel-in-progress: false

env:
  NAS_USER: acidfenix
  NAS_HOST: 192.168.50.158
  NAS_PATH: /volume1/docker/constructora-garibay
  DOCKER: /usr/local/bin/docker

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar artefactos del sitio
        run: |
          test -f deploy/site/index.html       || (echo "❌ falta deploy/site/index.html" && exit 1)
          test -f deploy/nginx/nginx.conf      || (echo "❌ falta deploy/nginx/nginx.conf" && exit 1)
          test -f deploy/docker-compose.yml    || (echo "❌ falta deploy/docker-compose.yml" && exit 1)
          echo "✅ Artefactos presentes"

      - name: Sincronizar deploy/ al NAS
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude ".env" \
            --exclude ".gitignore" \
            -e "ssh -o StrictHostKeyChecking=no" \
            deploy/ "${NAS_USER}@${NAS_HOST}:${NAS_PATH}/"

      - name: Asegurar deploy/.env en el NAS (token del tunnel)
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}
        run: |
          # El .env vive solo en el NAS (rsync lo excluye). Dos patrones soportados:
          #   A) Hay secret CLOUDFLARED_TOKEN → regeneramos el .env desde GitHub.
          #   B) No hay secret → usamos el .env ya colocado en el NAS (patrón cualotica).
          if [ -n "${CLOUDFLARED_TOKEN}" ]; then
            sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
              "umask 077 && printf 'CLOUDFLARED_TOKEN=%s\n' '${CLOUDFLARED_TOKEN}' > ${NAS_PATH}/.env"
            echo "✅ deploy/.env (re)escrito desde el secret CLOUDFLARED_TOKEN"
          else
            EXISTS=$(sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
              "test -s ${NAS_PATH}/.env && echo yes || echo no")
            if [ "$EXISTS" != "yes" ]; then
              echo "❌ No hay secret CLOUDFLARED_TOKEN ni ${NAS_PATH}/.env en el NAS."
              echo "   Opción A: añade el secret CLOUDFLARED_TOKEN al repo (Settings → Secrets → Actions)."
              echo "   Opción B: coloca deploy/.env con CLOUDFLARED_TOKEN en el NAS (como cualotica):"
              echo "             scp deploy/.env ${NAS_USER}@${NAS_HOST}:${NAS_PATH}/.env"
              exit 1
            fi
            echo "✅ Usando el deploy/.env existente en el NAS"
          fi

      - name: Levantar / actualizar contenedores
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
            "echo '${SSHPASS}' | sudo -S ${DOCKER} compose -f ${NAS_PATH}/docker-compose.yml up -d --remove-orphans 2>&1 && \
             echo '${SSHPASS}' | sudo -S ${DOCKER} compose -f ${NAS_PATH}/docker-compose.yml ps"

      - name: Recargar nginx (toma cambios de nginx.conf montado)
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
        run: |
          # nginx.conf es un bind-mount: si el contenedor no se recrea, el proceso
          # sigue con la config vieja. Validamos y recargamos en caliente.
          sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
            "echo '${SSHPASS}' | sudo -S ${DOCKER} exec garibay-nginx nginx -t && \
             echo '${SSHPASS}' | sudo -S ${DOCKER} exec garibay-nginx nginx -s reload && \
             echo '✅ nginx recargado'"

      - name: Verificar que nginx quedó arriba
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
        run: |
          for i in $(seq 1 10); do
            STATUS=$(sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
              "echo '${SSHPASS}' | sudo -S ${DOCKER} inspect --format='{{.State.Status}}' garibay-nginx 2>/dev/null || echo missing")
            echo "  Estado garibay-nginx: $STATUS (intento $i/10)"
            if [ "$STATUS" = "running" ]; then
              echo "✅ Deploy completado. Sitio servido por garibay-nginx."
              exit 0
            fi
            sleep 2
          done
          echo "❌ garibay-nginx no quedó corriendo"
          sshpass -e ssh -o StrictHostKeyChecking=no "${NAS_USER}@${NAS_HOST}" \
            "echo '${SSHPASS}' | sudo -S ${DOCKER} logs garibay-nginx --tail 40 2>&1" || true
          exit 1

      - name: Resultado
        if: failure()
        run: |
          echo "❌ Error en el deploy. Revisa los logs arriba."
          exit 1
