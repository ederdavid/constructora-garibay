worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml font/woff2;

  server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets: cache hard. Versioned by content; safe to keep long.
    location ~* \.(css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
      expires 30d;
      add_header Cache-Control "public";
      try_files $uri =404;
    }

    # HTML: always revalidate so deploys show up immediately.
    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }
  }
}
